services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: netaudit_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: netaudit
    volumes:
      - mongo_data:/data/db
      - ./infra/init.d:/docker-entrypoint-initdb.d:ro
    ports:
      - "27017:27017"
    networks:
      - netaudit_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Mongo Express (UI admin) ───────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0
    container_name: netaudit_mongo_ui
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-secret}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-secret}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-netaudit}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-netaudit}
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - netaudit_net
    profiles:
      - debug

  # ── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netaudit_backend
    restart: unless-stopped
    network_mode: "host"
    env_file:
      - .env
    environment:
      MONGO_HOST: 127.0.0.1
      MONGO_PORT: 27017
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: xavierdavid139@gmail.com
      SMTP_PASSWORD: thga sygn fxkm rchu
      EMAIL_TO: xavierdavid139@gmail.com
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - tunnel_data:/tunnel
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    cap_add:
      - NET_ADMIN
      - NET_RAW
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Frontend Nginx ─────────────────────────────────────────────────────────
  frontend:
    image: nginx:1.25-alpine
    container_name: netaudit_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/ssl:/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - netaudit_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Cloudflare Tunnel ──────────────────────────────────────────────────────
  tunnel:
    image: alpine:3.20
    container_name: netaudit_tunnel
    restart: unless-stopped
    command: >
      sh -c "
        apk add --no-cache curl >/dev/null 2>&1 &&
        if [ ! -f /cache/cloudflared ]; then
          echo '=== ⬇️ Téléchargement de cloudflared...' &&
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /tmp/cloudflared &&
          cp /tmp/cloudflared /cache/cloudflared;
        else
          echo '=== ♻️ Utilisation de cloudflared en cache' &&
          cp /cache/cloudflared /tmp/cloudflared;
        fi &&
        chmod +x /tmp/cloudflared &&
        echo '=== 🚀 NET AUDIT TUNNEL — démarrage...' &&
        /tmp/cloudflared tunnel --url http://netaudit_frontend:80 --no-autoupdate 2>&1 |
        tee -a /tmp/tunnel.log |
        while IFS= read -r line; do
          echo \"$$line\";
          url=\"$$(printf '%s' \"$$line\" | grep -o 'https://[a-z0-9-]*\.trycloudflare\.com')\";
          if [ -n \"$$url\" ]; then
            echo '{\"url\":\"'$$url'\",\"updated\":\"'$$(date -Iseconds)'\"}' > /shared/url.json;
            echo '{\"url\":\"'$$url'\",\"updated\":\"'$$(date -Iseconds)'\"}' > /host/url-tunnel.txt;
            echo '';
            echo '╔══════════════════════════════════════════════╗';
            echo \"║  🌐  TUNNEL PRÊT : $$url\";
            echo '╚══════════════════════════════════════════════╝';
            echo '';
            echo '📁 Fichier host: cat ~/url-tunnel.txt';
            echo '📁 Docker logs:  docker logs netaudit_tunnel | grep trycloudflare';
          fi;
        done
      "
    depends_on:
      frontend:
        condition: service_started
    volumes:
      - tunnel_data:/shared
      - /home/artemys20:/host
      - tunnel_cache:/cache
    networks:
      - netaudit_net

volumes:
  mongo_data:
    driver: local
  tunnel_data:
  tunnel_cache:

networks:
  netaudit_net:
    driver: bridge
